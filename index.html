<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModCore - Premium App Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #0b0c0f;
            --bg-surface: #13141a;
            --bg-search: #1c1e24;
            --accent-green: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #9aa0a6;
            --border-color: rgba(255, 255, 255, 0.04);
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        header {
            background-color: var(--bg-surface);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 20px;
        }

        .navbar::after {
            content: ""; display: table; clear: both;
        }

        .logo {
            float: left;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .logo span {
            color: var(--accent-green);
        }

        .menu-links {
            float: right;
            padding-top: 2px;
        }

        .menu-links a {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .menu-links a.active {
            color: var(--accent-green);
            background-color: rgba(0, 230, 118, 0.06);
        }

        /* SCREEN MANAGEMENT TAB */
        .index-tab {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 12px 20px;
        }

        .index-tab.active {
            display: block;
        }

        /* SEARCH BAR */
        .search-wrapper {
            background-color: var(--bg-search);
            border-radius: 20px;
            padding: 12px 16px;
            border: 1px solid transparent;
            position: relative;
            transition: all 0.2s;
        }

        .search-wrapper:focus-within {
            border-color: rgba(0, 230, 118, 0.2);
            background-color: var(--bg-surface);
        }

        .search-wrapper .material-symbols-outlined {
            position: absolute;
            left: 16px;
            top: 12px;
            color: var(--text-secondary);
            font-size: 20px;
        }

        .search-wrapper input {
            width: 100%;
            padding-left: 28px;
            border: none;
            background: none;
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
            font-weight: 500;
        }

        .section-header {
            margin: 20px 0 16px 0;
            padding-left: 2px;
        }

        .section-header::after {
            content: ""; display: table; clear: both;
        }

        .section-title {
            float: left;
            font-size: 15px;
            font-weight: 700;
        }

        .section-count {
            float: right;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* LIST APPLICATION ROW */
        .apps-list {
            display: block;
        }

        .app-row {
            display: block;
            background-color: var(--bg-surface);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s, background-color 0.15s;
        }

        .app-row:after {
            content: ""; display: table; clear: both;
        }

        .app-row:active {
            transform: scale(0.98);
            background-color: var(--bg-search);
        }

        .icon-area {
            float: left;
            width: 60px;
            height: 60px;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            object-fit: cover;
            background-color: var(--bg-search);
            display: block;
        }

        .info-area {
            margin-left: 74px;
        }

        .app-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-meta-top {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }

        .badge-version {
            font-size: 10px;
            color: var(--text-secondary);
            background-color: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .badge-mod {
            font-size: 10px;
            color: var(--accent-green);
            background-color: rgba(0, 230, 118, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .app-meta-bottom {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .app-meta-bottom .material-symbols-outlined {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* LEGAL PASAL COMPONENT BOX */
        .legal-card {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }

        .legal-card h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--accent-green);
        }

        .legal-card p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 14px;
        }

        /* LOADING COMPONENT */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            width: 100%;
        }

        .css-ring-spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(0, 230, 118, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-green);
            animation: putarGaris 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes putarGaris {
            to { transform: rotate(360deg); }
        }

        .loading-text-info {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        /* FOOTER DESIGN */
        footer {
            background-color: var(--bg-surface);
            text-align: center;
            padding: 24px 20px;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            padding-bottom: 80px;
        }

        .footer-copyright {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .footer-nav {
            display: block;
            line-height: 1.8;
        }

        .footer-nav a {
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-block;
            transition: color 0.2s;
            font-weight: 600;
            cursor: pointer;
        }

        .footer-nav a:hover {
            color: var(--accent-green);
        }

        .footer-dot {
            width: 3px;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: inline-block;
            margin: 0 8px;
            vertical-align: middle;
        }

        /* ADS ADSTERRA POPUP */
        .sticky-bottom-ad {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 60px;
            background-color: var(--bg-surface);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: block;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            padding: 4px;
        }

        .close-ad-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #ff4444;
            color: #ffffff;
            border: 2px solid var(--bg-body);
            width: 24px;
            height: 24px;
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 50%;
        }
        
        .material-symbols-outlined {
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo" onclick="bukaTab('tab-market')">Mod<span>Core</span></div>
            <div class="menu-links">
                <a onclick="bukaTab('tab-market')" id="nav-apps-link" class="active">Apps</a>
                <a onclick="bukaHalamanHukum('contact')">Request</a>
            </div>
        </nav>
    </header>

    <main class="index-tab active" id="tab-market">
        <div class="search-section">
            <div class="search-wrapper">
                <span class="material-symbols-outlined">search</span>
                <input type="text" id="searchInput" placeholder="Cari aplikasi atau game...">
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">Aplikasi Premium</h2>
            <span class="section-count" id="appCounter">0 Tersedia</span>
        </div>
        
        <div class="apps-list" id="appContainerList">
            <div class="loading-container" id="dbLoader">
                <div class="css-ring-spinner"></div>
                <div class="loading-text-info">Memuat aplikasi...</div>
            </div>
        </div>
    </main>

    <main class="index-tab" id="tab-legal">
        <div class="legal-card" id="legalContentBox"></div>
    </main>

    <footer>
        <p class="footer-copyright">© 2026 ModCore Market. All rights reserved.</p>
        <div class="footer-nav">
            <a onclick="bukaHalamanHukum('privacy')">Privacy Policy</a><span class="footer-dot"></span>
            <a onclick="bukaHalamanHukum('dmca')">DMCA</a><span class="footer-dot"></span>
            <a onclick="bukaHalamanHukum('disclaimer')">Disclaimer</a><span class="footer-dot"></span>
            <a onclick="bukaHalamanHukum('contact')">Contact Us</a>
        </div>
    </footer>

    <div class="sticky-bottom-ad" id="bottomAdBox">
        <div class="close-ad-btn" onclick="eksekusiTombolJebakan()"><span class="material-symbols-outlined" style="font-size:14px;">close</span></div>
        <script>atOptions = { 'key' : '80a170ca5256e42198d17ffe1379aa02', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };</script>
        <script src="https://www.highperformanceformat.com/80a170ca5256e42198d17ffe1379aa02/invoke.js"></script>
    </div>

    <script>
        const googleSheetApiUrl = "https://docs.google.com/spreadsheets/d/1FMu8RdrNxGsKAYF_AHU1YVJf3T2uDI9D63GTvCHrODA/export?format=csv&gid=0";
        let allAppsData = [];

        // Tautan utama khusus untuk tombol close banner bawah
        const smartlinkUtamaAdsterra = "https://www.effectivecpmnetwork.com/din0zwes7n?key=6adb5ba5a0bcf9f655a70ce2a432b901";

        fetch(googleSheetApiUrl)
            .then(res => res.text())
            .then(csvText => {
                allAppsData = csvToJSON(csvText);
                document.getElementById('dbLoader').style.display = 'none';
                document.getElementById('appCounter').textContent = allAppsData.length + " Tersedia";
                renderList(allAppsData);
            })
            .catch(() => { 
                document.getElementById('dbLoader').innerHTML = "<div class='loading-text-info'>Gagal memproses cloud database.</div>"; 
            });

        function csvToJSON(csv) {
            const lines = csv.split('\n');
            const result = [];
            if (lines.length === 0) return result;
            
            const headers = lines[0].split(',').map(h => h.replace(/["\r]/g, "").toLowerCase().trim());
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = currentline[j] ? currentline[j].replace(/["\r]/g, "").trim() : "";
                }
                result.push(obj);
            }
            return result;
        }

        function renderList(apps) {
            const container = document.getElementById('appContainerList');
            container.innerHTML = apps.map(app => {
                const link1 = app.link_iklan ? app.link_iklan.trim() : "";
                const link2 = app.link_iklan2 ? app.link_iklan2.trim() : "";
                
                const amanLink1 = link1.replace(/'/g, "\\'");
                const amanLink2 = link2.replace(/'/g, "\\'");

                return `
                    <div class="app-row" onclick="bukaAplikasiTahapanKlik('${app.id}', '${amanLink1}', '${amanLink2}')" style="cursor: pointer;">
                        <div class="icon-area">
                            <img src="${app.icon || 'https://via.placeholder.com/60'}" class="app-icon" alt="${app.title}">
                        </div>
                        <div class="info-area">
                            <div class="app-name">${app.title || 'Unknown App'}</div>
                            <div class="app-meta-top">
                                <span class="badge-version">${app.version || 'v1.0'}</span>
                                <span class="badge-mod">${app.mod || 'Modded'}</span>
                            </div>
                            <div class="app-meta-bottom">
                                <span class="material-symbols-outlined">hard_drive</span>
                                <span>${app.size || '-'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function bukaAplikasiTahapanKlik(appId, urlIklan1, urlIklan2) {
            // Menggunakan localStorage agar hitungan langkah klik dikunci permanen di sistem browser
            let keyPenyimpanan = 'step_klik_' + appId;
            let klikSekarang = parseInt(localStorage.getItem(keyPenyimpanan)) || 0;

            klikSekarang++;
            localStorage.setItem(keyPenyimpanan, klikSekarang);

            if (klikSekarang === 1) {
                // KLIK KE-1: Paksa buka link_iklan di tab baru
                if (urlIklan1 !== "") {
                    window.open(urlIklan1, '_blank');
                    return; // Kunci alur, batalkan pengalihan halaman utama
                } else {
                    // Jika data di spreadsheet kosong, bypass otomatis ke tingkat selanjutnya
                    klikSekarang = 2;
                    localStorage.setItem(keyPenyimpanan, klikSekarang);
                }
            }

            if (klikSekarang === 2) {
                // KLIK KE-2: Paksa buka link_iklan2 di tab baru
                if (urlIklan2 !== "") {
                    window.open(urlIklan2, '_blank');
                    return; // Kunci alur, batalkan pengalihan halaman utama
                }
            }

            // KLIK KE-3 (BERHASIL LOLOS):
            // Hapus cache penyimpanan klik aplikasi agar proses mengulang jika di masa depan diklik lagi
            localStorage.removeItem(keyPenyimpanan);
            
            // Pengunjung langsung dibawa masuk ke konten utama (view.html) dengan lancar!
            window.location.href = `apps/view.html?id=${appId}`;
        }

        // CONTROL NAVIGATION ENGINE FOR INTERNAL TAB
        function bukaTab(tabId) {
            document.querySelectorAll('.index-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            window.scrollTo({top: 0});
            
            if(tabId === 'tab-market') {
                document.getElementById('nav-apps-link').classList.add('active');
            } else {
                document.getElementById('nav-apps-link').classList.remove('active');
            }
        }

        // RENDER DINAMIS PASAL HUKUM
        function bukaHalamanHukum(jenis) {
            const box = document.getElementById('legalContentBox');
            if (jenis === 'privacy') {
                box.innerHTML = `<h2>Privacy Policy</h2><p>Di ModCore, kami menjaga privasi pengunjung dengan sangat ketat...</p>`;
            } else if (jenis === 'dmca') {
                box.innerHTML = `<h2>DMCA Copyright Notice</h2><p>ModCore sangat menghormati hak kekayaan intelektual orang lain...</p>`;
            } else if (jenis === 'disclaimer') {
                box.innerHTML = `<h2>Disclaimer</h2><p>Semua informasi dan file unduhan di website ini disediakan murni sebagai sarana edukasi...</p>`;
            } else if (jenis === 'contact') {
                box.innerHTML = `<h2>Contact Us / Request App</h2><p>Kirimkan permohonan pesan resmi Anda melalui alamat email admin pusat kami di bawah ini:</p><p style='color:var(--accent-green); font-weight:700; font-size:15px; text-align:center; padding:10px; background:rgba(0,230,118,0.05); border-radius:10px; margin-top:10px;'>support@modcore.market</p>`;
            }
            bukaTab('tab-legal');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const filtered = allAppsData.filter(app => (app.title && app.title.toLowerCase().includes(val)));
            renderList(filtered);
            document.getElementById('appCounter').textContent = filtered.length + " Tersedia";
        });

        function eksekusiTombolJebakan() {
            window.open(smartlinkUtamaAdsterra, '_blank'); 
            document.getElementById('bottomAdBox').style.display = 'none'; 
        }
    </script>
</body>
</html>
