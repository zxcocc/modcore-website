    <script>
        const googleSheetApiUrl = "https://docs.google.com/spreadsheets/d/1FMu8RdrNxGsKAYF_AHU1YVJf3T2uDI9D63GTvCHrODA/export?format=csv&gid=0";
        const smartlinkCadangan = "https://www.effectivecpmnetwork.com/din0zwes7n?key=6adb5ba5a0bcf9f655a70ce2a432b901";
        
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');
        let targetDownloadUrl = ""; 

        if (!appId) {
            window.location.href = "../index.html";
        } else {
            fetch(googleSheetApiUrl)
                .then(res => res.text())
                .then(csvText => {
                    const data = csvToJSON(csvText);
                    const appData = data.find(item => String(item.id).toLowerCase().trim() === appId.toLowerCase().trim());
                    
                    if (appData) {
                        document.getElementById('meta-title').textContent = "Unduh " + appData.title + " - ModCore";
                        document.getElementById('download-title').textContent = appData.title;
                        document.getElementById('download-version').textContent = appData.version + " • " + appData.mod;
                        document.getElementById('download-size').textContent = appData.size;
                        document.getElementById('download-icon').src = appData.icon || 'https://via.placeholder.com/76';
                        
                        targetDownloadUrl = appData.download_link && appData.download_link.trim() !== "" ? appData.download_link.trim() : "https://www.google.com";

                        document.getElementById('loaderBox').style.display = 'none';
                        document.getElementById('downloadContent').style.display = 'block';

                        startCountdown();
                    } else {
                        document.getElementById('loaderBox').innerHTML = "<div class='loading-text-info' style='color:#ff4444;'>Error: Berkas tidak valid.</div>";
                    }
                })
                .catch(() => {
                    document.getElementById('loaderBox').innerHTML = "<div class='loading-text-info'>Gagal memverifikasi cloud server.</div>";
                });
        }

        function csvToJSON(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.replace(/["\r]/g, "").toLowerCase().trim());
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = currentline[j] ? currentline[j].replace(/["\r]/g, "").trim() : "";
                }
                result.push(obj);
            }
            return result;
        }

        function startCountdown() {
            let timeLeft = 15;
            const secondsDisplay = document.getElementById('countdownSeconds');
            const statusDisplay = document.getElementById('statusMessage');
            const actionBtn = document.getElementById('downloadActionBtn');
            
            const timerInterval = setInterval(() => {
                timeLeft--;
                secondsDisplay.textContent = timeLeft;
                if(timeLeft === 10) statusDisplay.textContent = "Memindai file berkas dari virus malware berbahaya...";
                if(timeLeft === 5) statusDisplay.textContent = "Menghubungkan ke server enkripsi unduhan berkecepatan tinggi...";
                
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timerBox').style.display = 'none';
                    actionBtn.style.display = 'flex';
                    
                    actionBtn.onclick = function() {
                        eksekusiKlikFinal(appId);
                    };
                }
            }, 1000);
        }

        function eksekusiKlikFinal(idAplikasi) {
            let storageKey = 'tombol_download_klik_' + idAplikasi;
            let statusKlik = parseInt(localStorage.getItem(storageKey)) || 0;

            statusKlik++;
            localStorage.setItem(storageKey, statusKlik);

            if (statusKlik === 1) {
                window.open(smartlinkCadangan, '_blank');
                return;
            }

            localStorage.removeItem(storageKey);
            window.location.href = targetDownloadUrl;
        }

        // FUNGSI UNTUK MENUTUP IKLAN MELAYANG
        function tutupIklanMelayang() {
            document.getElementById('bottomFloatingAd').style.display = 'none';
        }
    </script>
