    <!-- INTERNALS JAVASCRIPT: DATABASE LINK & LOGIKA MULTI-SMARTLINK -->
    <script>
        // 🔒 DATABASE 10 APLIKASI UTAMA MODCORE
        // Catatan: Ganti tulisan "https://www.mediafire.com/file/contoh-link-asli/..." dengan link download MediaFire asli Anda agar tombolnya berfungsi!
        const linkDatabase = {
            "kinemaster": "https://www.mediafire.com/file/5gn6e0smx961a4m/Kinemaster_v8.1.12.36540.GP_MOD_modded_1.com.apk/file",
            "picsart": "https://www.mediafire.com/file/contoh-link-asli/picsart.apk",
            "capcut": "https://www.mediafire.com/file/contoh-link-asli/capcut.apk",
            "spotify": "https://www.mediafire.com/file/contoh-link-asli/spotify.apk",
            "youtube-revanced": "https://www.mediafire.com/file/contoh-link-asli/youtube-revanced.apk",
            "gbwhatsapp": "https://www.mediafire.com/file/contoh-link-asli/gbwhatsapp.apk",
            "canva": "https://www.mediafire.com/file/contoh-link-asli/canva.apk",
            "inshot": "https://www.mediafire.com/file/contoh-link-asli/inshot.apk",
            "aero-instagram": "https://www.mediafire.com/file/contoh-link-asli/aero-instagram.apk",
            "vpn-premium": "https://www.mediafire.com/file/contoh-link-asli/vpn-premium.apk"
        };

        const urlParams = new URLSearchParams(window.location.search);
        
        // 🛠️ PERBAIKAN: Sistem otomatis mengubah input URL menjadi huruf kecil agar anti-gagal/anti-typo
        const appKey = (urlParams.get('app') || "").toLowerCase();

        // Mengambil link target dari database, jika tidak ada/salah ketik kembali ke index.html
        const targetDownloadUrl = linkDatabase[appKey] || "../index.html";
        
        // DUA SMARTLINK ADSTERRA ANDA
        const smartlinkUrl1 = "https://www.effectivecpmnetwork.com/s1t94vin?key=347efe039b49a981e9ed0fd36b5518d3"; 
        const smartlinkUrl2 = "https://www.effectivecpmnetwork.com/e1win522?key=abf8cabd8b44258cfb274eea69c68e4e"; 

        let timeLeft = 10; 
        let clickCount = 0; 
        
        const timerElement = document.getElementById('timer');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusTitle = document.getElementById('status-title');

        const countdownInterval = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                timerElement.style.display = 'none'; 
                statusTitle.textContent = "File APK Siap Diunduh!";
                
                downloadBtn.className = "btn-download active";
                downloadBtn.innerHTML = '<i class="fas fa-cloud-download-alt"></i> Unduh APK Sekarang';
                
                // JALUR LOGIKA TRIPLE CLICK (3x KLIK)
                downloadBtn.addEventListener('click', function(e) {
                    clickCount++;
                    
                    if (clickCount === 1) {
                        // KLIK 1: Membuka Smartlink 1 di tab baru
                        e.preventDefault();
                        window.open(smartlinkUrl1, '_blank');
                    } 
                    else if (clickCount === 2) {
                        // KLIK 2: Membuka Smartlink 2 di tab baru
                        e.preventDefault();
                        window.open(smartlinkUrl2, '_blank');
                    } 
                    else if (clickCount >= 3) {
                        // KLIK 3: Mengalirkan pengunjung ke link MediaFire asli yang terdaftar di atas
                        downloadBtn.href = targetDownloadUrl;
                    }
                });
            }
        }, 1000);
    </script>
