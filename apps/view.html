<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Memuat Aplikasi... - ModCore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #0b0c0f;
            --bg-surface: #13141a;
            --bg-search: #1c1e24;
            --accent-green: #00e676;
            --text-primary: #ffffff;
            --text-secondary: #9aa0a6;
            --border-color: rgba(255, 255, 255, 0.04);
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        header {
            background-color: var(--bg-surface);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        /* FLEXBOX HEADER FIXED (ANTI TERPOTONG) */
        .navbar {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .logo-left {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
        }

        .logo-left span {
            color: var(--accent-green);
        }

        .container {
            max-width: 600px;
            margin: 20px auto 0 auto;
            padding: 0 20px;
        }

        /* DETAIL HEADER CARD */
        .detail-header-card {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .detail-header-card::after {
            content: ""; display: table; clear: both;
        }

        .detail-icon {
            float: left;
            width: 80px;
            height: 80px;
            border-radius: 18px;
            object-fit: cover;
            background-color: var(--bg-search);
        }

        .detail-main-info {
            margin-left: 98px;
            padding-top: 2px;
        }

        .detail-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .detail-dev {
            color: var(--accent-green);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .detail-badges {
            display: flex;
            gap: 6px;
        }

        .badge-version {
            font-size: 10px;
            color: var(--text-secondary);
            background-color: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .badge-mod {
            font-size: 10px;
            color: var(--accent-green);
            background-color: rgba(0, 230, 118, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        /* METRIKS GRID SEJAJAR FLEXBOX */
        .info-grid {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-surface);
            padding: 16px 12px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .grid-item {
            flex: 1;
            text-align: center;
        }

        .grid-item h4 {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }

        .grid-item p {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        .grid-line {
            width: 1px;
            height: 28px;
            background-color: var(--border-color);
            flex-shrink: 0;
        }

        /* CONTENT DESCRIPTION TEXT */
        .desc-box {
            background-color: var(--bg-surface);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .desc-box h3 {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .desc-box p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 14px;
        }

        .desc-box p:last-child {
            margin-bottom: 0;
        }

        .features-list {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 13px;
        }

        /* STICKY BOTTOM WRAPPER BUTTON */
        .bottom-action-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(19, 20, 26, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            padding: 16px 20px;
            z-index: 999;
        }

        .bottom-action-wrapper {
            max-width: 560px;
            margin: 0 auto;
        }

        .btn-action-trigger {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--accent-green);
            color: #0b0c0f;
            padding: 14px;
            border-radius: 28px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            border: none;
            width: 100%;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.2);
            transition: transform 0.1s;
        }

        .btn-action-trigger:active {
            transform: scale(0.98);
        }

        /* CSS SHAPE LOADING DUAL RING */
        .loading-view-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .css-ring-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(0, 230, 118, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-green);
            animation: putarGaris 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes putarGaris {
            to { transform: rotate(360deg); }
        }

        .loading-text-info {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .material-symbols-outlined {
            display: inline-block;
            vertical-align: middle;
            line-height: 1;
        }
    </style>
    
    <script src="https://pl29751245.effectivecpmnetwork.com/1b/6a/ae/1b6aaef05c365930e84b8ffc5af02f92.js"></script>
</head>
<body>

    <header>
        <nav class="navbar">
            <a class="logo-left" href="../index.html">Mod<span>Core</span></a>
        </nav>
    </header>

    <div class="container" id="loadingWrapper">
        <div class="loading-view-container">
            <div class="css-ring-spinner"></div>
            <div class="loading-text-info">Menyelaraskan data aplikasi...</div>
        </div>
    </div>

    <main class="container" id="contentWrapper" style="display: none;">
        
        <div class="detail-header-card">
            <img id="view-icon" src="" class="detail-icon" alt="App Icon">
            <div class="detail-main-info">
                <h1 id="view-title" class="detail-title">-</h1>
                <p id="view-developer" class="detail-dev">-</p>
                <div class="detail-badges">
                    <span id="view-badge-ver" class="badge-version">-</span>
                    <span id="view-badge-mod" class="badge-mod">-</span>
                </div>
            </div>
        </div>

        <div class="info-grid">
            <div class="grid-item">
                <h4>4.8 <span class="material-symbols-outlined" style="font-size:14px; color:#ffb300; font-variation-settings:'FILL' 1">star</span></h4>
                <p>Rating Ulasan</p>
            </div>
            <div class="grid-line"></div>
            <div class="grid-item">
                <h4 style="color:var(--accent-green);">Aman</h4>
                <p>Anti Virus</p>
            </div>
            <div class="grid-line"></div>
            <div class="grid-item">
                <h4 id="view-info-size">-</h4>
                <p>Ukuran File</p>
            </div>
        </div>

        <div class="desc-box">
            <h3>Tentang Aplikasi</h3>
            <p id="view-desc1"></p>
            <p id="view-desc2"></p>
        </div>

        <div class="desc-box">
            <h3>Fitur Modifikasi</h3>
            <div id="view-features" class="features-list"></div>
        </div>

    </main>

    <div class="bottom-action-container" id="actionButtonWrapper" style="display: none;">
        <div class="bottom-action-wrapper">
            <button id="view-btn-next" class="btn-action-trigger">
                <span class="material-symbols-outlined">download</span> 
                Menyiapkan Unduhan...
            </button>
        </div>
    </div>

    <script>
        const googleSheetApiUrl = "https://docs.google.com/spreadsheets/d/1FMu8RdrNxGsKAYF_AHU1YVJf3T2uDI9D63GTvCHrODA/export?format=csv&gid=0";
        const smartlinkUtamaAdsterra = "https://www.effectivecpmnetwork.com/din0zwes7n?key=6adb5ba5a0bcf9f655a70ce2a432b901";
        
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');

        let linkIklanUtama = ""; 

        if (!appId) {
            window.location.href = "../index.html";
        } else {
            fetch(googleSheetApiUrl)
                .then(res => res.text())
                .then(csvText => {
                    const allAppsData = csvToJSON(csvText);
                    const targetApp = allAppsData.find(item => String(item.id).toLowerCase().trim() === appId.toLowerCase().trim());
                    
                    if (targetApp) {
                        suntikDataKeHalaman(targetApp);
                    } else {
                        alert("Aplikasi tidak ditemukan dalam database.");
                        window.location.href = "../index.html";
                    }
                })
                .catch(() => {
                    document.getElementById('loadingWrapper').innerHTML = "<div class='loading-text-info'>Koneksi terputus. Gagal memuat data.</div>";
                });
        }

        function csvToJSON(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.replace(/["\r]/g, "").toLowerCase().trim());
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = currentline[j] ? currentline[j].replace(/["\r]/g, "").trim() : "";
                }
                result.push(obj);
            }
            return result;
        }

        function suntikDataKeHalaman(app) {
            document.getElementById('site-title').textContent = app.title + " Mod Premium APK - ModCore";
            document.getElementById('view-icon').src = app.icon || 'https://via.placeholder.com/80';
            document.getElementById('view-title').textContent = app.title || 'Unknown App';
            document.getElementById('view-developer').textContent = app.developer || 'Premium Modder';
            document.getElementById('view-badge-ver').textContent = app.version || 'v1.0';
            document.getElementById('view-badge-mod').textContent = app.mod || 'Modded Features';
            document.getElementById('view-info-size').textContent = app.size || '-';
            
            document.getElementById('view-desc1').innerHTML = app.desc1 || 'Tidak ada deskripsi tambahan.';
            document.getElementById('view-desc2').innerHTML = app.desc2 || '';
            document.getElementById('view-features').innerHTML = app.features || 'Premium Unlocked';
            
            linkIklanUtama = app.link_iklan ? app.link_iklan.trim() : "";

            const btnDownload = document.getElementById('view-btn-next');
            btnDownload.innerHTML = `<span class="material-symbols-outlined">download</span> Unduh APK (${app.size || 'File'})`;
            btnDownload.onclick = function() {
                eksekusiKlikDownload(app.id);
            };

            document.getElementById('loadingWrapper').style.display = 'none';
            document.getElementById('contentWrapper').style.display = 'block';
            document.getElementById('actionButtonWrapper').style.display = 'block';
        }

        function eksekusiKlikDownload(idAplikasi) {
            let storageKey = 'tombol_view_klik_' + idAplikasi;
            let statusKlik = parseInt(localStorage.getItem(storageKey)) || 0;

            statusKlik++;
            localStorage.setItem(storageKey, statusKlik);

            if (statusKlik === 1) {
                if (linkIklanUtama !== "") {
                    window.open(linkIklanUtama, '_blank');
                } else {
                    window.open(smartlinkUtamaAdsterra, '_blank');
                }
                return;
            }

            localStorage.removeItem(storageKey);
            window.location.href = `../download/download.html?id=${idAplikasi}`;
        }
    </script>
</body>
</html>
